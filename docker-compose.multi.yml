version: "3.9"

services:
  opentrident-coordinator:
    image: ${OPENTRIDENT_IMAGE:-opentrident:latest}
    environment:
      - OPENTRIDENT_INSTANCE_ROLE=coordinator
      - OPENTRIDENT_INSTANCE_ID=coordinator-1
      - OPENTRIDENT_STATE_DIR=/opt/opentrident/state
    volumes:
      - opentrident-state:/opt/opentrident/state
      - ./src:/app/src:ro
      - ./docs:/app/docs:ro
      - ./skills:/app/skills:ro
    ports:
      - "127.0.0.1:18889:18789"
      - "127.0.0.1:18890:18790"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  opentrident-worker-1:
    image: ${OPENTRIDENT_IMAGE:-opentrident:latest}
    environment:
      - OPENTRIDENT_INSTANCE_ROLE=worker
      - OPENTRIDENT_INSTANCE_ID=worker-1
      - OPENTRIDENT_STATE_DIR=/opt/opentrident/state
    volumes:
      - opentrident-state:/opt/opentrident/state
    restart: unless-stopped
    depends_on:
      - opentrident-coordinator

  opentrident-worker-2:
    image: ${OPENTRIDENT_IMAGE:-opentrident:latest}
    environment:
      - OPENTRIDENT_INSTANCE_ROLE=worker
      - OPENTRIDENT_INSTANCE_ID=worker-2
      - OPENTRIDENT_STATE_DIR=/opt/opentrident/state
    volumes:
      - opentrident-state:/opt/opentrident/state
    restart: unless-stopped
    depends_on:
      - opentrident-coordinator

volumes:
  opentrident-state:
    driver: local
